<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" role="img" aria-label="Arthur Mestdagt profile card">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="avatar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="sky-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#30363d"/>
    </linearGradient>
    <clipPath id="avatar-clip">
      <circle cx="130" cy="130" r="72"/>
    </clipPath>
  </defs>

  <rect width="900" height="260" rx="18" fill="url(#card-bg)" stroke="#30363d" stroke-width="1.5"/>
  <rect x="1" y="1" width="898" height="6" rx="18" fill="url(#sky-bar)" opacity="0.95"/>

  <!-- Avatar -->
  <circle cx="130" cy="130" r="76" fill="none" stroke="#30363d" stroke-width="2"/>
  <circle cx="130" cy="130" r="72" fill="url(#avatar-bg)"/>
  <g clip-path="url(#avatar-clip)">
    <text x="130" y="148" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="52" font-weight="700" fill="#ffffff">AM</text>
  </g>
  <circle cx="188" cy="188" r="14" fill="#238636" stroke="#0d1117" stroke-width="3"/>

  <!-- Identity -->
  <text x="240" y="78"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="600" fill="#f0f6fc">Arthur Mestdagt</text>

  <text x="242" y="112"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="18" fill="#38bdf8">@Arts44</text>

  <text x="242" y="148"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="17" fill="#8b949e">Étudiant · HEC Ličge · Belgique</text>

  <text x="242" y="178"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="15" fill="#6e7681">Web apps · PWAs · outils utiles · détails soignés</text>

  <!-- Passion pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="500">
    <rect x="240" y="198" width="92" height="30" rx="15" fill="url(#pill)" stroke="#30363d"/>
    <text x="286" y="218" text-anchor="middle" fill="#f0f6fc">Formula 1</text>

    <rect x="342" y="198" width="36" height="30" rx="15" fill="url(#pill)" stroke="#30363d"/>
    <text x="360" y="218" text-anchor="middle" fill="#f0f6fc">IA</text>

    <rect x="388" y="198" width="108" height="30" rx="15" fill="url(#pill)" stroke="#30363d"/>
    <text x="442" y="218" text-anchor="middle" fill="#f0f6fc">Programming</text>

    <rect x="506" y="198" width="88" height="30" rx="15" fill="url(#pill)" stroke="#30363d"/>
    <text x="550" y="218" text-anchor="middle" fill="#f0f6fc">Minecraft</text>

    <rect x="604" y="198" width="108" height="30" rx="15" fill="url(#pill)" stroke="#30363d"/>
    <text x="658" y="218" text-anchor="middle" fill="#f0f6fc">Photography</text>
  </g>

  <!-- Right stats -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="820" y="78" text-anchor="end" font-size="13" fill="#6e7681">FOCUS</text>
    <text x="820" y="104" text-anchor="end" font-size="18" font-weight="600" fill="#f0f6fc">Web &amp; Apps</text>

    <text x="820" y="142" text-anchor="end" font-size="13" fill="#6e7681">STACK</text>
    <text x="820" y="168" text-anchor="end" font-size="18" font-weight="600" fill="#f0f6fc">JS · Java · PWA</text>

    <text x="820" y="206" text-anchor="end" font-size="13" fill="#6e7681">STATUS</text>
    <text x="820" y="232" text-anchor="end" font-size="18" font-weight="600" fill="#3fb950">Open to connect</text>
  </g>
</svg>
